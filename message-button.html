<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Notification Button</title>
</head>
<style>
    *{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
}
body{
    align-items: center;
    justify-content: center;
    display: flex;
    height: 100vh;
    background-color: #00002c;
}
button{
    background-color: #008cff;
    color: white;
    border: none;
    width: 60px;
    height: 60px;
    font-size: 28px;
    border-radius: 15px 15px 15px 0;
    position: relative;
    cursor: pointer;
    border: solid 2px white;
    transition: 0.3s;
}
button::before{
    content: "1";
    position: absolute;
    width: 22px;
    height: 22px;
    background-color: red;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    font-size: 19px;
    top: -10px;
    right: -10px;
    border: solid 2px white;
    transition: 0.3s;
    transform: scale(0);
}
i{transition: 0.3s;}
button:hover::before{
    transform: scale(1);
}
button:hover{
    border-radius: 15px 15px 0 15px;
    background-color: #00d0ff;
}
button:hover i{
    transform: rotateY(180deg);
}
</style>
<body>
    <button><i class="fa-regular fa-message"></i></button>
</body>
</html>
