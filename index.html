<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
</head>

<body>
    <form>
        <div class="container">
            <h1>Contact Us</h1>
            <div class="input-box">
                <input type="text" placeholder="First Name*" name="First_name" required autofocus>
                <input type="text" placeholder="Last Name*" name="Last_name" required>
                <input type="email" placeholder="Email*" name="email" required>
                <input type="text" placeholder="Phone Number*" name="Phone_number" required>
            </div>
            <div class="show-more">
                <a href="#">Show More</a>
            </div>
            <textarea name="message" required placeholder="Message"></textarea>
            <div class="captcha-box">
                <p>This site is protected by reCAPTCHA and the Google <a href="#">Privacy Policy</a>
                    and <a href="#">Terms of Service</a> apply.</p>
            </div>
            <button type="submit" class="send-btn">Send my message</button>
        </div>
    </form>
</body>

</html>
