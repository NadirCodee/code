<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI image Generator | Coded by Nadir</title>
</head>
<body>
    <!-- THIS PAGE IS NOT RESPONSIVE ! -->
    <div class="container">
        <div class="header">
            <div class="icon-box">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>AI Image Generator</span>
            </div>
            <div class="dark-mode">
                <button><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
        <div class="prompt-input-box">
            <textarea placeholder="Describe your imagination in detail..."></textarea>
        </div>
            <div class="options-btn">
            <div class="first-box">
                <button>Select Model</button>
                <button>Image Count</button>
                <button>Aspect Ratio</button>
            </div>
            <div class="last-btn">
                <button>
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
                </button>
            </div>
        </div>
    </div>
</body>
</html>
