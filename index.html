<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile Card</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="card">

        <div class="card__image">
            <img src="https://img.freepik.com/free-vector/gradient-code-logo-with-tagline_23-2148811020.jpg"
                alt="Profile Image">
        </div>

        <h1 class="card__title">Code Info</h1>

        <p class="card__description">
            Front-end Developer & Content Creator at <strong>YouTube</strong>
        </p>

        <div class="social">

            <div class="social__links">
                <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            </div>

            <div class="social__stats">
                <span>2M Followers</span>
                <span>90K Followers</span>
                <span>500K Followers</span>
                <span>2000+ Projects</span>
            </div>

        </div>

        <div class="card__actions">
            <button class="btn btn--message">Message</button>
            <button class="btn btn--follow">Follow</button>
        </div>

    </main>

</body>

</html>
